databaseChangeLog:
  - changeSet:
      id: 001-create-users
      author: pulsedesk
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_users
                    nullable: false

              - column:
                  name: username
                  type: VARCHAR(80)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: password_hash
                  type: VARCHAR(120)
                  constraints:
                    nullable: false

              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: team_id
                  type: BIGINT
                  constraints:
                    nullable: true

        - createIndex:
            tableName: users
            indexName: ix_users_username
            unique: true
            columns:
              - column:
                  name: username