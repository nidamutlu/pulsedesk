databaseChangeLog:
  - changeSet:
      id: 005-create-notifications
      author: pulsedesk
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_notifications
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: ticket_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: comment_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: message
                  type: VARCHAR(500)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false

              - column:
                  name: read_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            baseTableName: notifications
            baseColumnNames: ticket_id
            referencedTableName: tickets
            referencedColumnNames: id
            constraintName: fk_notifications_ticket

        - addForeignKeyConstraint:
            baseTableName: notifications
            baseColumnNames: comment_id
            referencedTableName: ticket_comments
            referencedColumnNames: id
            constraintName: fk_notifications_comment

        - createIndex:
            tableName: notifications
            indexName: idx_notifications_user_created_at
            columns:
              - column:
                  name: user_id
              - column:
                  name: created_at

        - createIndex:
            tableName: notifications
            indexName: idx_notifications_user_read_at
            columns:
              - column:
                  name: user_id
              - column:
                  name: read_at