databaseChangeLog:
  - changeSet:
      id: 004-create-ticket-audit-logs
      author: pulsedesk
      changes:
        - createTable:
            tableName: ticket_audit_logs
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_ticket_audit_logs
                    nullable: false

              - column:
                  name: ticket_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: action
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: old_status
                  type: VARCHAR(50)
                  constraints:
                    nullable: true

              - column:
                  name: new_status
                  type: VARCHAR(50)
                  constraints:
                    nullable: true

              - column:
                  name: old_assignee_id
                  type: BIGINT
                  constraints:
                    nullable: true

              - column:
                  name: new_assignee_id
                  type: BIGINT
                  constraints:
                    nullable: true

              - column:
                  name: actor_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false

        - createIndex:
            tableName: ticket_audit_logs
            indexName: idx_ticket_audit_logs_ticket_id
            columns:
              - column:
                  name: ticket_id