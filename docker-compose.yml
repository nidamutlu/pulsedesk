services:
  postgres:
    image: postgres:16-alpine
    container_name: pulsedesk-postgres
    environment:
      POSTGRES_DB: pulsedesk
      POSTGRES_USER: pulsedesk
      POSTGRES_PASSWORD: pulsedesk
    ports:
      - "5432:5432"
    volumes:
      - pulsedesk_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: pulsedesk-backend
    depends_on:
      - postgres
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pulsedesk
      SPRING_DATASOURCE_USERNAME: pulsedesk
      SPRING_DATASOURCE_PASSWORD: pulsedesk
    ports:
      - "8080:8080"

volumes:
  pulsedesk_pgdata: